<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 466" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13">
  <defs>
    <clipPath id="win"><rect x="0" y="0" width="800" height="466" rx="10"/></clipPath>
  </defs>
  <g clip-path="url(#win)">
    <rect width="800" height="466" rx="10" fill="#0d1117"/>
    <rect width="800" height="34" fill="#161b22"/>
    <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="17" r="6" fill="#febc2e"/>
    <circle cx="60" cy="17" r="6" fill="#28c840"/>
    <text x="400" y="21" fill="#8b949e" text-anchor="middle" font-size="12">shiploop — replay of a real run (see examples/standup)</text>

    <text x="24" y="62" fill="#7ee787">$ claude
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.018;0.019;0.96;1" dur="26s" repeatCount="indefinite"/></text>
    <text x="24" y="84" fill="#e6edf3">&gt; I have an idea: a CLI that captures my workday in one line …
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.057;0.058;0.96;1" dur="26s" repeatCount="indefinite"/></text>

    <text x="24" y="118" fill="#e6edf3"><tspan fill="#a371f7">⏺ project-onboarding</tspan>  pitch interview → brief <tspan fill="#7ee787">APPROVED</tspan> <tspan fill="#8b949e">(4 must-haves, 5 non-goals)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.134;0.135;0.96;1" dur="26s" repeatCount="indefinite"/></text>
    <text x="24" y="140" fill="#e6edf3"><tspan fill="#a371f7">⏺ autonomous-setup</tspan>    research ×3 → 5 ADRs → walking skeleton → 6 WORK cards
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.211;0.212;0.96;1" dur="26s" repeatCount="indefinite"/></text>

    <text x="24" y="174" fill="#e6edf3"><tspan fill="#a371f7">⏺ autonomous-loop</tspan> — cycle 1
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.307;0.308;0.96;1" dur="26s" repeatCount="indefinite"/></text>
    <text x="24" y="196" fill="#8b949e">  ⎿ DEV  WORK-001 storage append/read        review: <tspan fill="#7ee787">APPROVED</tspan> · <tspan fill="#7ee787">14/14 tests</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.345;0.346;0.96;1" dur="26s" repeatCount="indefinite"/></text>

    <text x="24" y="230" fill="#e6edf3"><tspan fill="#a371f7">⏺ cycle 2</tspan> — two DEVs in parallel, disjoint claim zones
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.422;0.423;0.96;1" dur="26s" repeatCount="indefinite"/></text>
    <text x="24" y="252" fill="#8b949e">  ⎿ DEV  WORK-002 capture                    review: <tspan fill="#7ee787">APPROVED</tspan> <tspan fill="#8b949e">(follow-ups)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.460;0.461;0.96;1" dur="26s" repeatCount="indefinite"/></text>
    <text x="24" y="274" fill="#8b949e">  ⎿ DEV  WORK-003 show last workday          review: <tspan fill="#7ee787">APPROVED</tspan> <tspan fill="#8b949e">(follow-ups)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.475;0.476;0.96;1" dur="26s" repeatCount="indefinite"/></text>
    <text x="24" y="296" fill="#8b949e">  ⎿ FIX  WORK-005 smoke-test isolation <tspan fill="#8b949e">(review finding)</tspan> · suite <tspan fill="#7ee787">31/31</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.537;0.538;0.96;1" dur="26s" repeatCount="indefinite"/></text>

    <text x="24" y="330" fill="#e6edf3"><tspan fill="#a371f7">⏺ cycle 3</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.595;0.596;0.96;1" dur="26s" repeatCount="indefinite"/></text>
    <text x="24" y="352" fill="#8b949e">  ⎿ DEV  WORK-004 end-to-end proof           review: <tspan fill="#7ee787">APPROVED</tspan> · suite <tspan fill="#7ee787">36/36</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.634;0.635;0.96;1" dur="26s" repeatCount="indefinite"/></text>

    <text x="24" y="386" fill="#7ee787">✔ MVP gate reached — all must-have outcomes proven · loop stopped
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.71;0.712;0.96;1" dur="26s" repeatCount="indefinite"/></text>
    <text x="24" y="408" fill="#8b949e">  4 ideas captured, 0 built (value filter) · retro → 2 learnings distilled
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.742;0.743;0.96;1" dur="26s" repeatCount="indefinite"/></text>

    <text x="24" y="442" fill="#7ee787">$ standup <tspan fill="#e6edf3">"shipped the demo"</tspan>  <tspan fill="#7ee787">$ standup</tspan>  <tspan fill="#e6edf3">→ 2026-07-11: shipped the demo</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.807;0.808;0.96;1" dur="26s" repeatCount="indefinite"/></text>
  </g>
</svg>
